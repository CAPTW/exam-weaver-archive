learning_design:
  chapter_learning_goals:
    - "규정 영어 문장에서 의무, 허용, 금지, 조건을 구분한다."
    - "조약·규칙 정의문을 구조적으로 해석한다."
    - "해사 약어와 용어를 단순 암기가 아니라 기능·상황과 연결한다."
    - "빈출 문항 패턴을 풀기 전에 필요한 독해 절차를 세운다."
  prerequisite_foundations:
    - "기본 영문장 성분: 주어, 동사, 목적어, 보어, 수식어"
    - "기본 조동사 의미"
    - "선박·항해·통신 분야가 규정 언어로 출제된다는 메타인지"
  target_concepts:
    - concept_id: C-CH01-001
      name: "규정상 의무 강도"
      includes:
        - "shall"
        - "must"
        - "may"
        - "should"
        - "is required to"
        - "is prohibited from"
    - concept_id: C-CH01-002
      name: "정의문 구조"
      includes:
        - "means"
        - "refers to"
        - "is defined as"
        - "a situation wherein"
    - concept_id: C-CH01-003
      name: "조건·예외·범위 신호"
      includes:
        - "where"
        - "when"
        - "unless"
        - "except"
        - "not less than"
        - "within"
    - concept_id: C-CH01-004
      name: "해사 맥락 어휘"
      includes:
        - "passage"
        - "underway"
        - "make way"
        - "muster"
        - "drill"
        - "datum"
        - "traffic lane"
    - concept_id: C-CH01-005
      name: "약어와 코드"
      includes:
        - "ETA"
        - "MMSI"
        - "AIS"
        - "EPIRB"
        - "SART"
        - "OSC"
  pedagogy_sequence:
    - "문장 기능을 먼저 구분한다."
    - "정의문 구조를 시각적으로 분해한다."
    - "약어·용어를 상황별로 묶는다."
    - "기출 패턴을 원문 복제 없이 추상화한 worked example로 적용한다."
    - "원문형·정의형·약어형 연습문제를 난도별로 푼다."

source_evidence:
  source_status: "reference mining required before drafting"
  known_source_needs:
    primary:
      - source_need_id: SRC-CH01-001
        need: "IMO Standard Marine Communication Phrases glossary and general principles"
        purpose: "SMCP 표준 표현, message marker, ambiguity control의 기준 출처"
      - source_need_id: SRC-CH01-002
        need: "UNCLOS, COLREG, SOLAS, MARPOL, STCW, ISPS official texts or authorized extracts"
        purpose: "shall/may/must, definition syntax, numeric condition examples의 source-backed 설명"
      - source_need_id: SRC-CH01-003
        need: "IAMSAR terminology references"
        purpose: "datum, distress phase, OSC 등 SAR 용어 정의 검증"
    secondary:
      - source_need_id: SRC-CH01-004
        need: "maritime English teaching references"
        purpose: "규정 영어 독해법과 용어 학습 설계 보강"
      - source_need_id: SRC-CH01-005
        need: "bilingual maritime glossary"
        purpose: "한국어 오역 방지 note와 용어 표준화"
  source_use_policy:
    - "공식 문구는 필요한 짧은 구절만 인용하고, 대부분은 paraphrase와 구조 설명으로 처리한다."
    - "문항 원문, 보기 전체, 해설 전체를 복사하지 않는다."
    - "모든 figure caption과 claim은 source_note_registry.yml 생성 후 연결한다."

