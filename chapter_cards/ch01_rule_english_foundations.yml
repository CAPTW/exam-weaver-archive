misconception_targets:
  - misconception_id: M-CH01-001
    target: "shall을 단순 미래시제로 해석"
    correction_strategy: "규정문에서 shall은 의무·요건을 만드는 신호임을 ladder로 반복"
    linked_sections:
      - ch01_s02
  - misconception_id: M-CH01-002
    target: "may를 항상 허가로만 해석"
    correction_strategy: "권한 부여, 가능성, 재량 표현을 문맥별로 분리"
    linked_sections:
      - ch01_s02
  - misconception_id: M-CH01-003
    target: "means 뒤 전체 정의부가 아니라 첫 명사만 보고 답 선택"
    correction_strategy: "정의부의 수식어와 예외부를 bracket annotation으로 표시"
    linked_sections:
      - ch01_s03
  - misconception_id: M-CH01-004
    target: "general English 의미를 해사 맥락에 그대로 적용"
    correction_strategy: "false friend map과 상황별 mini-context drill 제공"
    linked_sections:
      - ch01_s04
  - misconception_id: M-CH01-005
    target: "약어를 full form만 외우고 기능을 모름"
    correction_strategy: "통신/장비/구조/보안 기능별 카드와 mixed classification drill"
    linked_sections:
      - ch01_s05

